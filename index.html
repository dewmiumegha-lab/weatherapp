<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="p.jpeg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Weather App</h1>
    <div class="container">
        <input type="text" id="cityInput" placeholder="Enter a city" />
        <button onclick="getWeather()">Search</button>
        <div class="weather-info">
            <p id="weatherDescription">Enter a city to get weather updates.</p>
            <p id="temp"></p>
            <img id="weatherIcon" class="icon" src="" alt="" style="display:none;">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
